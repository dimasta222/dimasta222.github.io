worker_processes auto;

events {
}

http {
    include /etc/nginx/mime.types;
types {
    text/javascript mjs;
}    default_type application/octet-stream;

    server {
        listen 80;
        server_name futurespb.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name futurespb.ru;
        root /usr/share/nginx/html;
        index index.html;
        client_max_body_size 50M;

        ssl_certificate     /etc/letsencrypt/live/futurespb.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/futurespb.ru/privkey.pem;

        # index.html — никогда не кешировать (SPA точка входа)
        location = /index.html {
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma no-cache;
            add_header Expires 0;
        }

        # Хешированные ассеты — кешировать вечно
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
